name: Build Search Index

on:
  push:
    branches: [main]
    paths:
      - "subtitles/**"
      - "build_index.py"
      - "build_lunr_index.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lunr (for pre-built index)
        run: npm install lunr

      - name: Parse SRT files → chunk JSON
        run: python build_index.py

      - name: Pre-serialize Lunr index
        run: node build_lunr_index.js

      - name: Commit and push search-index/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index/
          git rm --cached search-data.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: rebuild search index [skip ci]"
          git push
