name: Build Search Index

on:
  push:
    branches: [main]
    paths:
      - "subtitles/**"
      - "build_index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build search index chunks
        run: python build_index.py

      - name: Commit and push search-index/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index/
          # Remove old monolithic file if it exists
          git rm --cached search-data.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: rebuild search index [skip ci]"
          git push
